name: Bundle budget

# Measure bundle size on every PR and fail if over budget → block bundle regressions before merge.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  bundle-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # version is read from package.json's packageManager (pnpm@11.1.2) → matches local
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Native builds (sharp/@parcel/watcher, etc.) aren't needed to measure bundle size.
      # --ignore-scripts skips dependency build scripts to avoid ERR_PNPM_IGNORED_BUILDS.
      - run: pnpm install --frozen-lockfile --ignore-scripts

      # next build reads env at module load, so inject dummy build-time values.
      # (only bundle size is measured, so no real secrets are needed — routes are runtime-dynamic)
      - name: Build
        run: pnpm build
        env:
          AUTH_URL: http://localhost:3000
          AUTH_SECRET: ci-dummy-secret
          AUTH_GOOGLE_ID: ci-dummy
          AUTH_GOOGLE_SECRET: ci-dummy
          AUTH_GITHUB_ID: ci-dummy
          AUTH_GITHUB_SECRET: ci-dummy
          SUPABASE_URL: https://ci-dummy.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci-dummy
          OPENAI_API_KEY: ci-dummy
          NEXT_PUBLIC_SOCKET_URL: http://localhost:4000

      - name: Check bundle budget
        run: pnpm check:bundle-budget
        env:
          BUNDLE_BUDGET_KB: 250
