name: Bundle budget

# PR마다 번들 크기를 측정해 예산 초과 시 실패 → 번들 회귀를 머지 전에 차단.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  bundle-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 버전은 package.json의 packageManager(pnpm@11.1.2)에서 읽음 → 로컬과 동일
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # 번들 크기 측정엔 네이티브 빌드(sharp/@parcel/watcher 등)가 불필요.
      # --ignore-scripts로 dependency 빌드 스크립트를 건너뛰어 ERR_PNPM_IGNORED_BUILDS 회피.
      - run: pnpm install --frozen-lockfile --ignore-scripts

      # next build는 모듈 로드 시 env를 참조하므로 빌드용 더미값을 넣는다.
      # (번들 크기만 재므로 실제 시크릿은 불필요 — 라우트는 런타임 dynamic)
      - name: Build
        run: pnpm build
        env:
          AUTH_URL: http://localhost:3000
          AUTH_SECRET: ci-dummy-secret
          AUTH_GOOGLE_ID: ci-dummy
          AUTH_GOOGLE_SECRET: ci-dummy
          AUTH_GITHUB_ID: ci-dummy
          AUTH_GITHUB_SECRET: ci-dummy
          SUPABASE_URL: https://ci-dummy.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci-dummy
          OPENAI_API_KEY: ci-dummy
          NEXT_PUBLIC_SOCKET_URL: http://localhost:4000

      - name: Check bundle budget
        run: pnpm check:bundle-budget
        env:
          BUNDLE_BUDGET_KB: 250
